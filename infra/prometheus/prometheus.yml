global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: polycopy-watcher
    static_configs:
      - targets: ['polycopy-watcher:9101']
  - job_name: polycopy-notifier
    static_configs:
      - targets: ['polycopy-notifier:9102']
  - job_name: polycopy-marketdata
    static_configs:
      - targets: ['polycopy-marketdata:9103']
  - job_name: polycopy-risk
    static_configs:
      - targets: ['polycopy-risk:9104']
