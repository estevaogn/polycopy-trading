services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: polycopy-postgres
    restart: unless-stopped
    labels:
      com.polycopy.role: infra
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - polycopy_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  nats:
    image: nats:2.10-alpine
    container_name: polycopy-nats
    restart: unless-stopped
    labels:
      com.polycopy.role: infra
    command: ["-js", "-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - polycopy_nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: polycopy-redis
    restart: unless-stopped
    labels:
      com.polycopy.role: infra
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: polycopy-prometheus
    restart: unless-stopped
    labels:
      com.polycopy.role: infra
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - polycopy_prometheus_data:/prometheus

  watcher:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODULE: watcher
    image: polycopy/watcher:dev
    container_name: polycopy-watcher
    restart: unless-stopped
    labels:
      com.polycopy.role: agent
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: polycopy-postgres
      NATS_URL: nats://polycopy-nats:4222
      REDIS_URL: redis://polycopy-redis:6379/0
      WATCHER_INTERVAL_S: "5"
      WATCHER_BOOTSTRAP_HOURS: "24"
      WATCHER_METRICS_PORT: "9101"
      WALLETS_SEED_PATH: /app/config/wallets_seed.yaml
      POLYMARKET_BASE_URL: https://data-api.polymarket.com
    ports:
      - "127.0.0.1:9101:9101"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9101/metrics\", timeout=2).read()' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  notifier:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODULE: notifier
    image: polycopy/notifier:dev
    container_name: polycopy-notifier
    restart: unless-stopped
    labels:
      com.polycopy.role: agent
    depends_on:
      nats:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      # Settings exige todas as vars de infra mesmo que o notifier não use postgres/redis.
      # Refator pra split (PostgresConfig, RedisConfig) entra em fase posterior.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: polycopy-postgres
      NATS_URL: nats://polycopy-nats:4222
      REDIS_URL: redis://polycopy-redis:6379/0
      WALLETS_SEED_PATH: /app/config/wallets_seed.yaml
      NOTIFIER_METRICS_PORT: "9102"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ports:
      - "127.0.0.1:9102:9102"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9102/metrics\", timeout=2).read()' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  marketdata:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODULE: marketdata
    image: polycopy/marketdata:dev
    container_name: polycopy-marketdata
    restart: unless-stopped
    labels:
      com.polycopy.role: agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      # Settings exige todas as vars de infra mesmo que o marketdata não use nats/redis.
      # Refator pra split (PostgresConfig, RedisConfig) entra em fase posterior.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: polycopy-postgres
      NATS_URL: nats://polycopy-nats:4222
      REDIS_URL: redis://polycopy-redis:6379/0
      GAMMA_API_BASE_URL: https://gamma-api.polymarket.com
      CLOB_API_BASE_URL: https://clob.polymarket.com
      MARKETDATA_METRICS_PORT: "9103"
      MARKETDATA_SYNC_INTERVAL_SECONDS: "300"
      MARKETDATA_TOP_N: "200"
      MARKET_CACHE_TTL_SECONDS: "1800"
    ports:
      - "127.0.0.1:9103:9103"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9103/metrics\", timeout=2).read()' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  risk:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODULE: risk
    image: polycopy/risk:dev
    container_name: polycopy-risk
    restart: unless-stopped
    labels:
      com.polycopy.role: agent
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: polycopy-postgres
      NATS_URL: nats://polycopy-nats:4222
      REDIS_URL: redis://polycopy-redis:6379/0
      GAMMA_API_BASE_URL: https://gamma-api.polymarket.com
      CLOB_API_BASE_URL: https://clob.polymarket.com
      MARKET_CACHE_TTL_SECONDS: "1800"
      RISK_METRICS_PORT: "9104"
      RISK_MAX_DELIVER: "5"
      RISK_DURABLE_NAME: "risk-1"
      RISK_MAX_TRADE_USDC: "100"
      RISK_MIN_PRICE: "0.05"
      RISK_MAX_PRICE: "0.95"
      RISK_MIN_LIQUIDITY_USDC: "1000"
      RISK_GAMMA_FETCH_TIMEOUT_S: "5.0"
    ports:
      - "127.0.0.1:9104:9104"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9104/metrics\", timeout=2).read()' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  sizing:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODULE: sizing
    image: polycopy/sizing:dev
    container_name: polycopy-sizing
    restart: unless-stopped
    labels:
      com.polycopy.role: agent
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: polycopy-postgres
      NATS_URL: nats://polycopy-nats:4222
      REDIS_URL: redis://polycopy-redis:6379/0
      SIZING_METRICS_PORT: "9105"
      SIZING_MAX_DELIVER: "5"
      SIZING_DURABLE_NAME: "sizing-1"
      SIZING_PROPORTION_RATIO: "0.1"
      SIZING_MAX_SIZE_USDC: "50"
      SIZING_MIN_SIZE_USDC: "1"
    ports:
      - "127.0.0.1:9105:9105"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9105/metrics\", timeout=2).read()' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  executor:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODULE: executor
    image: polycopy/executor:dev
    container_name: polycopy-executor
    restart: unless-stopped
    labels:
      com.polycopy.role: agent
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: polycopy-postgres
      NATS_URL: nats://polycopy-nats:4222
      REDIS_URL: redis://polycopy-redis:6379/0
      EXECUTOR_METRICS_PORT: "9106"
      EXECUTOR_MAX_DELIVER: "5"
      EXECUTOR_DURABLE_NAME: "executor-1"
      EXECUTOR_DRY_RUN: "true"
    ports:
      - "127.0.0.1:9106:9106"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9106/metrics\", timeout=2).read()' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  resolver:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODULE: resolver
    image: polycopy/resolver:dev
    container_name: polycopy-resolver
    restart: unless-stopped
    labels:
      com.polycopy.role: agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      # Settings exige todas as vars de infra mesmo que o resolver não use nats/redis.
      # Refator pra split (PostgresConfig, RedisConfig) entra em fase posterior.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: polycopy-postgres
      NATS_URL: nats://polycopy-nats:4222
      REDIS_URL: redis://polycopy-redis:6379/0
      GAMMA_API_BASE_URL: https://gamma-api.polymarket.com
      RESOLVER_METRICS_PORT: "9107"
      RESOLVER_SYNC_INTERVAL_SECONDS: "3600"
      RESOLVER_BATCH_SIZE: "100"
    ports:
      - "127.0.0.1:9107:9107"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9107/metrics\", timeout=2).read()' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  polycopy_postgres_data:
  polycopy_nats_data:
  polycopy_prometheus_data:
