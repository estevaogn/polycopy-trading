services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: polycopy-postgres
    restart: unless-stopped
    labels:
      com.polycopy.role: infra
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - polycopy_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  nats:
    image: nats:2.10-alpine
    container_name: polycopy-nats
    restart: unless-stopped
    labels:
      com.polycopy.role: infra
    command: ["-js", "-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - polycopy_nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: polycopy-redis
    restart: unless-stopped
    labels:
      com.polycopy.role: infra
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: polycopy-prometheus
    restart: unless-stopped
    labels:
      com.polycopy.role: infra
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - polycopy_prometheus_data:/prometheus

  watcher:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODULE: watcher
    image: polycopy/watcher:dev
    container_name: polycopy-watcher
    restart: unless-stopped
    labels:
      com.polycopy.role: agent
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: polycopy-postgres
      NATS_URL: nats://polycopy-nats:4222
      REDIS_URL: redis://polycopy-redis:6379/0
      WATCHER_INTERVAL_S: "5"
      WATCHER_BOOTSTRAP_HOURS: "24"
      WATCHER_METRICS_PORT: "9101"
      WALLETS_SEED_PATH: /app/config/wallets_seed.yaml
      POLYMARKET_BASE_URL: https://data-api.polymarket.com
    ports:
      - "127.0.0.1:9101:9101"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9101/metrics\", timeout=2).read()' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  notifier:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODULE: notifier
    image: polycopy/notifier:dev
    container_name: polycopy-notifier
    restart: unless-stopped
    labels:
      com.polycopy.role: agent
    depends_on:
      nats:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      # Settings exige todas as vars de infra mesmo que o notifier não use postgres/redis.
      # Refator pra split (PostgresConfig, RedisConfig) entra em fase posterior.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: polycopy-postgres
      NATS_URL: nats://polycopy-nats:4222
      REDIS_URL: redis://polycopy-redis:6379/0
      WALLETS_SEED_PATH: /app/config/wallets_seed.yaml
      NOTIFIER_METRICS_PORT: "9102"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ports:
      - "127.0.0.1:9102:9102"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9102/metrics\", timeout=2).read()' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  polycopy_postgres_data:
  polycopy_nats_data:
  polycopy_prometheus_data:
